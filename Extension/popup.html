<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 15px; font-family: Arial, sans-serif; background: #f4f4f9; }
    h3 { margin-top: 0; color: #333; }
    label { font-weight: bold; color: #555; }
    input[type="text"] { width: 100%; padding: 8px; margin: 8px 0 15px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .radio-group { margin: 8px 0 15px 0; padding: 8px; background: #fff; border-radius: 4px; border: 1px solid #ddd; }
    .radio-group label { font-weight: normal; margin-right: 6px; cursor: pointer; }
    .radio-group input { margin-right: 3px; }
    button { width: 100%; padding: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #0052a3; }
    .status { margin-top: 10px; font-size: 12px; color: green; text-align: center; }
  </style>
</head>
<body>
  <h3>Manga Translator API</h3>
  <label for="serverUrl">FastAPI Server URL:</label>
  <input type="text" id="serverUrl" placeholder="http://localhost:7860">

  <label>OCR Model:</label>
  <div class="radio-group">
    <input type="radio" id="ocrJa" name="ocrModel" value="ja" checked>
    <label for="ocrJa">Japanese (Hayai+YOLO)</label>
    <br>
    <input type="radio" id="ocrKo" name="ocrModel" value="ko" style="margin-top: 6px;">
    <label for="ocrKo">Korean (PaddleOCR)</label>
  </div>

  <button id="saveBtn">Save Settings</button>
  <button id="translateBtn" style="background: #28a745; margin-top: 10px;">Translate All Images Now</button>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
