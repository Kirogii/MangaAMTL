<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 15px; font-family: Arial, sans-serif; background: #1e1e2e; color: #e0e0e0; }
    h3 { margin-top: 0; color: #ffffff; }
    label { font-weight: bold; color: #aaaaaa; }
    input[type="text"] { width: 100%; padding: 8px; margin: 8px 0 15px 0; box-sizing: border-box; border: 1px solid #444; border-radius: 4px; background: #2a2a3c; color: #e0e0e0; }
    .radio-group { margin: 8px 0 15px 0; padding: 8px; background: #2a2a3c; border-radius: 4px; border: 1px solid #444; }
    .radio-group label { font-weight: normal; margin-right: 6px; cursor: pointer; color: #ccc; }
    .radio-group input { margin-right: 3px; }
    .checkbox-group { margin: 8px 0 15px 0; padding: 8px; background: #2a2a3c; border-radius: 4px; border: 1px solid #444; display: flex; align-items: center; }
    .checkbox-group label { font-weight: normal; margin-left: 6px; cursor: pointer; color: #ccc; }
    button { width: 100%; padding: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    button:hover { background: #0052a3; }
    button.success { background: #28a745; }
    button.success:hover { background: #218838; }
    button.secondary { background: #3a3f4b; border: 1px solid #555; }
    button.secondary:hover { background: #4a4f5b; }
    .status { margin-top: 10px; font-size: 12px; color: #28a745; text-align: center; }
  </style>
</head>
<body>
  <h3>Manga Translator API</h3>
  <label for="serverUrl">FastAPI Server URL:</label>
  <input type="text" id="serverUrl" placeholder="http://localhost:7860">

  <label>OCR Model:</label>
  <div class="radio-group">
    <input type="radio" id="ocrJa" name="ocrModel" value="ja" checked>
    <label for="ocrJa">Japanese (Hayai+YOLO)</label>
    <br>
    <input type="radio" id="ocrKo" name="ocrModel" value="ko" style="margin-top: 6px;">
    <label for="ocrKo">Korean (PaddleOCR)</label>
  </div>

  <div class="checkbox-group">
    <input type="checkbox" id="colorize" checked>
    <label for="colorize">Enable Colorization</label>
  </div>

  <button id="saveBtn">Save Settings</button>
  <button id="translateBtn" class="success">Translate All Images Now</button>
  <button id="optionsBtn" class="secondary">Advanced Settings (Models)</button>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
